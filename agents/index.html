<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Horse Property Agent | HorsePropertyAgents.com</title>
<meta name="description" content="Browse horse property specialists across the United States. Search by state, city, or name.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #1a1410;
  --clay:   #8b5e3c;
  --sand:   #f5ede0;
  --sand-dk:#e8d9c4;
  --cream:  #faf7f2;
  --white:  #ffffff;
  --muted:  #7a6a58;
  --border: #d9c9b4;
  --max:    1180px;
  --r:      6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ─── HEADER ─── */
.hdr { background: var(--white); border-bottom: 1px solid var(--border); padding: 28px 24px 22px; }
.hdr-inner { max-width: var(--max); margin: 0 auto; }
h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; margin-bottom: 6px; }
.sub { font-size: .9rem; color: var(--muted); margin-bottom: 18px; }
.sub strong { color: var(--ink); }

/* ─── FILTERS ─── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-box input {
  width: 100%; padding: 10px 12px 10px 36px;
  font-family: 'Jost', sans-serif; font-size: .92rem;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--cream); color: var(--ink); outline: none;
}
.search-box input:focus { border-color: var(--clay); }
select.state-dd {
  padding: 10px 14px; font-family: 'Jost', sans-serif; font-size: .88rem;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--white); color: var(--ink); outline: none; cursor: pointer; min-width: 140px;
}
select.state-dd:focus { border-color: var(--clay); }
button.clr {
  padding: 10px 16px; font-family: 'Jost', sans-serif; font-size: .78rem;
  font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: var(--r);
  background: none; color: var(--muted); cursor: pointer;
}
button.clr:hover { color: var(--ink); border-color: var(--ink); }

/* ─── BODY ─── */
.body-wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px 72px; }
.count-bar { font-size: .8rem; color: var(--muted); padding: 14px 0 12px; min-height: 40px; }

/* ─── GRID ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

/* ─── CARD ─── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 20px 16px;
  display: flex;
  flex-direction: column;
  transition: border-color .18s, box-shadow .18s, transform .15s;
}
.card:hover { border-color: var(--clay); box-shadow: 0 4px 20px rgba(139,94,60,.1); transform: translateY(-2px); }

.c-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 3px; }
.c-company { font-size: .77rem; font-weight: 600; color: var(--clay); margin-bottom: 2px; }
.c-loc { font-size: .77rem; color: var(--muted); margin-bottom: 14px; }

.c-contact { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.c-contact a { display: flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--ink); text-decoration: none; }
.c-contact a:hover { color: var(--clay); }
.c-contact a svg { color: var(--clay); flex-shrink: 0; }

.c-rule { border: none; border-top: 1px solid var(--sand-dk); margin-bottom: 12px; }
.c-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; }
.c-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.c-tag { font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--clay); background: var(--sand); border-radius: 99px; padding: 3px 9px; }
.c-view { flex-shrink: 0; font-size: .8rem; font-weight: 600; color: var(--clay); text-decoration: none; white-space: nowrap; }
.c-view:hover { text-decoration: underline; }

/* ─── SKELETON ─── */
.skel { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.sk { background: linear-gradient(90deg, var(--sand-dk) 25%, var(--sand) 50%, var(--sand-dk) 75%); background-size: 200% 100%; animation: shim 1.4s infinite; border-radius: 3px; height: 12px; margin-bottom: 10px; }
@keyframes shim { to { background-position: -200% 0; } }
.sk.w70 { width: 70%; } .sk.w50 { width: 50%; } .sk.w85 { width: 85%; } .sk.w60 { width: 60%; }

/* ─── EMPTY ─── */
.empty { grid-column: 1 / -1; text-align: center; padding: 64px 20px; color: var(--muted); }
.empty strong { display: block; font-size: 1rem; color: var(--ink); margin-bottom: 8px; }

/* ─── PAGINATION ─── */
.pager { display: flex; gap: 6px; justify-content: center; padding-top: 28px; flex-wrap: wrap; }
.pg { font-family: 'Jost', sans-serif; font-size: .82rem; font-weight: 600; padding: 8px 14px; border-radius: 4px; border: 1px solid var(--border); background: var(--white); color: var(--ink); cursor: pointer; transition: all .15s; }
.pg:hover { border-color: var(--clay); color: var(--clay); }
.pg.on { background: var(--clay); border-color: var(--clay); color: #fff; }

/* ─── FOOTER ─── */
footer { background: #162017; padding: 22px 24px; text-align: center; }
.fcopy { font-size: .72rem; color: rgba(255,255,255,.25); letter-spacing: .04em; }
.fcopy a { color: rgba(255,255,255,.4); text-decoration: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <h1>Find a Horse Property Specialist</h1>
    <p class="sub">Browse <strong id="total">—</strong> agents across the United States</p>
    <div class="filters">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="q" type="text" placeholder="Search name, city, company…" autocomplete="off">
      </div>
      <select id="st" class="state-dd"><option value="">All States</option></select>
      <button class="clr" onclick="clearAll()">Clear</button>
    </div>
  </div>
</div>

<div class="body-wrap">
  <div class="count-bar" id="bar"></div>
  <div class="grid" id="grid">
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
    <div class="skel"><div class="sk w70"></div><div class="sk w50"></div><div class="sk w60"></div><div class="sk w85"></div><div class="sk w60"></div></div>
  </div>
</div>

<footer>
  <div class="fcopy">
    &copy; 2026 <a href="https://bridleandbit.com" target="_blank">Bridle &amp; Bit Magazine</a> &nbsp;&middot;&nbsp; <a href="/">HorsePropertyAgents.com</a>
  </div>
</footer>

<script src="/nav.js" defer></script>
<script>
const SB_URL = 'https://ykkfziyxipeuugocwswo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlra2Z6aXl4aXBldXVnb2N3c3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIyMDUsImV4cCI6MjA4OTU0ODIwNX0.BbTuMNHEXm8PUjFgKc0Te6rjoW7ns-2A8dzCtShV8-4';
const db = supabase.createClient(SB_URL, SB_KEY);

const PG = 24;
let all = [], filtered = [], page = 1;

function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function specs(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(Boolean).slice(0,3);
  return val.split(',').map(s=>s.trim()).filter(Boolean).slice(0,3);
}

function card(a) {
  const loc = [a.city, a.state].filter(Boolean).join(', ');
  const ph  = a.phone ? a.phone.replace(/\D/g,'') : '';
  const tags = specs(a.specialties).map(s=>`<span class="c-tag">${x(s)}</span>`).join('');

  return '<div class="card">'
    + '<div class="c-name">' + x(a.name) + '</div>'
    + (a.company ? '<div class="c-company">' + x(a.company) + '</div>' : '')
    + '<div class="c-loc">' + x(loc) + '</div>'
    + '<div class="c-contact">'
    + (a.phone ? '<a href="tel:' + ph + '"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/></svg>' + x(a.phone) + '</a>' : '')
    + (a.email ? '<a href="mailto:' + x(a.email) + '"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>' + x(a.email) + '</a>' : '')
    + '</div>'
    + '<hr class="c-rule">'
    + '<div class="c-foot">'
    + '<div class="c-tags">' + tags + '</div>'
    + '<a class="c-view" href="/agent/' + x(a.slug) + '/">View &rarr;</a>'
    + '</div>'
    + '</div>';
}

function draw() {
  const grid = document.getElementById('grid');
  const bar  = document.getElementById('bar');
  removePager();

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><strong>No agents found</strong>Try a different search or clear the filters.</div>';
    bar.textContent = '';
    return;
  }

  const start = (page-1)*PG;
  const slice = filtered.slice(start, start+PG);
  grid.innerHTML = slice.map(card).join('');
  bar.textContent = 'Showing ' + (start+1) + '–' + Math.min(start+PG, filtered.length) + ' of ' + filtered.length + ' agents';
  drawPager();
}

function filter() {
  page = 1;
  const q  = document.getElementById('q').value.trim().toLowerCase();
  const st = document.getElementById('st').value;
  filtered = all.filter(a => {
    if (st && a.state !== st) return false;
    if (q) {
      const hay = [(a.name||''),(a.city||''),(a.company||''),(a.state||'')].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  draw();
}

function clearAll() {
  document.getElementById('q').value = '';
  document.getElementById('st').value = '';
  filtered = all;
  page = 1;
  draw();
  document.getElementById('bar').textContent = '';
}

function drawPager() {
  const total = Math.ceil(filtered.length/PG);
  if (total <= 1) return;
  const wrap = document.createElement('div');
  wrap.id = 'pager';
  wrap.className = 'pager';
  for (let i=1; i<=total; i++) {
    const b = document.createElement('button');
    b.className = 'pg' + (i===page?' on':'');
    b.textContent = i;
    b.onclick = () => { page=i; draw(); document.getElementById('grid').scrollIntoView({behavior:'smooth',block:'start'}); };
    wrap.appendChild(b);
  }
  document.querySelector('.body-wrap').appendChild(wrap);
}

function removePager() {
  const old = document.getElementById('pager');
  if (old) old.remove();
}

async function init() {
  const { data } = await db
    .from('agents')
    .select('name,slug,city,state,specialties,phone,email,company')
    .order('name', { ascending: true })
    .limit(1000);

  if (!data || !data.length) {
    document.getElementById('grid').innerHTML = '<div class="empty"><strong>No agents found</strong>Check back soon.</div>';
    return;
  }

  all = data;
  filtered = data;
  document.getElementById('total').textContent = data.length;

  const states = [...new Set(data.map(a=>a.state).filter(Boolean))].sort();
  const sel = document.getElementById('st');
  states.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });

  const p = new URLSearchParams(window.location.search);
  if (p.get('state')) sel.value = p.get('state');
  if (p.get('q')) document.getElementById('q').value = p.get('q');

  filter();
  document.getElementById('q').addEventListener('input', filter);
  document.getElementById('st').addEventListener('change', filter);
}

init();
</script>
</body>
</html>
