<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Horse Property Agent | HorsePropertyAgents.com</title>
<link rel="canonical" href="https://horsepropertyagents.com/agents/">
<meta name="description" content="Browse horse property specialists across the United States. Search by name, city, or state.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1410;--clay:#8b5e3c;--sand:#f5ede0;--sand-dk:#e8d9c4;
  --cream:#faf7f2;--white:#fff;--muted:#7a6a58;--border:#d9c9b4;
  --max:1200px;--r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}

.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:28px 20px 22px;}
.page-header-inner{max-width:var(--max);margin:0 auto;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2rem);font-weight:700;margin-bottom:4px;}
.page-sub{font-size:.88rem;color:var(--muted);margin-bottom:18px;}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.search-wrap{flex:1;min-width:160px;position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-wrap input{width:100%;font-family:'Jost',sans-serif;font-size:1rem;color:var(--ink);background:var(--cream);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px 10px 38px;outline:none;}
.search-wrap input:focus{border-color:var(--clay);}
.state-select{font-family:'Jost',sans-serif;font-size:1rem;color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;outline:none;cursor:pointer;min-width:120px;}
.state-select:focus{border-color:var(--clay);}
.clear-btn{font-family:'Jost',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;cursor:pointer;}
.clear-btn:hover{color:var(--ink);border-color:var(--ink);}

.results-bar{max-width:var(--max);margin:0 auto;padding:14px 20px 0;font-size:.8rem;color:var(--muted);}

.agents-wrap{max-width:var(--max);margin:0 auto;padding:16px 20px 64px;}

.agent-grid{
  display:grid;
  grid-template-columns:repeat(1,1fr);
  gap:12px;
}
@media(min-width:580px){.agent-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:880px){.agent-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1160px){.agent-grid{grid-template-columns:repeat(4,1fr);}}

.agent-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
  text-decoration:none;
  color:inherit;
  display:block;
  transition:border-color .2s,box-shadow .2s,transform .15s;
}
.agent-card:hover{border-color:var(--clay);box-shadow:0 4px 18px rgba(139,94,60,.13);transform:translateY(-2px);}
.c-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.3;}
.c-company{font-size:.75rem;font-weight:600;color:var(--clay);margin-bottom:2px;}
.c-loc{font-size:.75rem;color:var(--muted);margin-bottom:12px;}
.c-sep{border:none;border-top:1px solid var(--sand-dk);margin-bottom:10px;}
.c-phone,.c-email{font-size:.8rem;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:6px;word-break:break-all;overflow-wrap:anywhere;}
.c-phone svg,.c-email svg{color:var(--clay);flex-shrink:0;}
.c-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:10px;border-top:1px solid var(--sand-dk);}
.c-tag{font-size:.78rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--clay);background:var(--sand);border-radius:99px;padding:4px 10px;}

.skel-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.skeleton{background:linear-gradient(90deg,var(--sand-dk) 25%,var(--sand) 50%,var(--sand-dk) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:3px;height:13px;margin-bottom:10px;}
@keyframes shimmer{to{background-position:-200% 0;}}
.sk-w80{width:80%;}.sk-w50{width:50%;}.sk-w65{width:65%;}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;font-size:.95rem;color:var(--muted);}
.empty-state strong{display:block;font-size:1.1rem;color:var(--ink);margin-bottom:8px;}

.pagination{display:flex;gap:8px;justify-content:center;padding:28px 0 0;flex-wrap:wrap;}
.pg-btn{font-family:'Jost',sans-serif;font-size:.82rem;font-weight:600;padding:11px 16px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--ink);}
.pg-btn.active,.pg-btn:hover{border-color:var(--clay);background:var(--clay);color:#fff;}

footer{background:#162017;padding:20px 16px;text-align:center;}
.footer-copy{font-size:.78rem;color:rgba(255,255,255,.25);letter-spacing:.04em;}
.footer-copy a{color:rgba(255,255,255,.4);text-decoration:none;}

@media(max-width:479px){
  .agent-grid{grid-template-columns:1fr;}
  .search-wrap{min-width:100%;flex-basis:100%;}
  .state-select{flex:1;}
  .clear-btn{white-space:nowrap;}
  .c-phone,.c-email{font-size:.88rem;padding:10px 0;min-height:44px;align-items:center;}
  .page-header{padding:20px 16px 16px;}
  .agents-wrap{padding:12px 12px 48px;}
  .agent-grid{gap:10px;}
  .results-bar{padding:10px 12px 0;}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <h1 class="page-title">Find a Horse Property Specialist</h1>
    <p class="page-sub">Browse <span id="total-count">—</span> agents across the United States</p>
    <div class="filter-bar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search name, city, state…" autocomplete="off">
      </div>
      <select class="state-select" id="state-filter"><option value="">All States</option></select>
      <button class="clear-btn" onclick="clearFilters()">Clear</button>
    </div>
  </div>
</div>

<div class="results-bar" id="results-bar"></div>

<div class="agents-wrap">
  <div class="agent-grid" id="agent-grid">
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
    <div class="skel-card"><div class="skeleton sk-w80"></div><div class="skeleton sk-w50"></div><div class="skeleton sk-w65"></div></div>
  </div>
</div>

<footer>
    <div style="max-width:var(--max,1200px);margin:0 auto;padding:16px 20px 0;display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:center;">
      <a href="/learn/" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Buyer's Guide</a>
      <a href="/learn/types-of-listings.html" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Types of Listings</a>
      <a href="/learn/agents-vs-brokers.html" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Agents vs. Brokers</a>
      <a href="/learn/appraisals.html" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Appraisals</a>
      <a href="/learn/disclosures.html" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Disclosures</a>
      <a href="/learn/escrow.html" style="font-size:.78rem;color:rgba(255,255,255,.45);text-decoration:none;">Escrow</a>
    </div>
  <div class="footer-copy">
    &copy; 2026 <a href="https://bridleandbit.com" target="_blank">Bridle &amp; Bit Magazine</a> &nbsp;&middot;&nbsp;
    <a href="/">HorsePropertyAgents.com</a>
  </div>
</footer>

<script src="/nav.js" defer></script>
<script>
const SUPABASE_URL      = 'https://ykkfziyxipeuugocwswo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlra2Z6aXl4aXBldXVnb2N3c3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIyMDUsImV4cCI6MjA4OTU0ODIwNX0.BbTuMNHEXm8PUjFgKc0Te6rjoW7ns-2A8dzCtShV8-4';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PAGE_SIZE = 24;
let allAgents = [], filteredAgents = [], currentPage = 1;

function parseSpecs(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(Boolean);
  return val.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
}

function makeCard(a) {
  var card = document.createElement('a');
  card.href = '/agent/' + a.slug + '/';
  card.className = 'agent-card';

  var name = document.createElement('div');
  name.className = 'c-name';
  name.textContent = a.name;
  card.appendChild(name);

  if (a.company) {
    var co = document.createElement('div');
    co.className = 'c-company';
    co.textContent = a.company;
    card.appendChild(co);
  }

  var loc = document.createElement('div');
  loc.className = 'c-loc';
  loc.textContent = [a.city, a.state].filter(Boolean).join(', ');
  card.appendChild(loc);

  if (a.phone || a.email) {
    var sep = document.createElement('hr');
    sep.className = 'c-sep';
    card.appendChild(sep);

    if (a.phone) {
      var ph = document.createElement('a');
      ph.className = 'c-phone';
      ph.href = 'tel:' + a.phone.replace(/\D/g, '');
      ph.addEventListener('click', function(e){ e.stopPropagation(); });
      ph.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.19 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.54a16 16 0 0 0 6.07 5.52l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
      ph.appendChild(document.createTextNode(a.phone));
      card.appendChild(ph);
    }

    if (a.email) {
      var em = document.createElement('a');
      em.className = 'c-email';
      em.href = 'mailto:' + a.email;
      em.addEventListener('click', function(e){ e.stopPropagation(); });
      em.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>';
      em.appendChild(document.createTextNode(a.email));
      card.appendChild(em);
    }
  }

  var specs = parseSpecs(a.specialties).slice(0, 3);
  if (specs.length) {
    var tags = document.createElement('div');
    tags.className = 'c-tags';
    specs.forEach(function(s) {
      var t = document.createElement('span');
      t.className = 'c-tag';
      t.textContent = s;
      tags.appendChild(t);
    });
    card.appendChild(tags);
  }

  return card;
}

function renderPage() {
  var grid  = document.getElementById('agent-grid');
  var bar   = document.getElementById('results-bar');
  var start = (currentPage - 1) * PAGE_SIZE;
  var slice = filteredAgents.slice(start, start + PAGE_SIZE);

  grid.innerHTML = '';
  removePagination();

  if (!filteredAgents.length) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<strong>No agents found</strong>Try a different search.';
    grid.appendChild(empty);
    bar.textContent = '';
    return;
  }

  slice.forEach(function(a) { grid.appendChild(makeCard(a)); });
  bar.textContent = 'Showing ' + (start+1) + '\u2013' + Math.min(start+PAGE_SIZE, filteredAgents.length) + ' of ' + filteredAgents.length + ' agents';
  renderPagination();
}

function renderPagination() {
  var total = Math.ceil(filteredAgents.length / PAGE_SIZE);
  if (total <= 1) return;
  var wrap = document.createElement('div');
  wrap.id = 'pagination';
  wrap.className = 'pagination';
  for (var i = 1; i <= total; i++) {
    (function(i){
      var btn = document.createElement('button');
      btn.className = 'pg-btn' + (i === currentPage ? ' active' : '');
      btn.textContent = i;
      btn.onclick = function() {
        currentPage = i;
        renderPage();
        document.getElementById('agent-grid').scrollIntoView({behavior:'smooth',block:'start'});
      };
      wrap.appendChild(btn);
    })(i);
  }
  document.querySelector('.agents-wrap').appendChild(wrap);
}

function removePagination() {
  var old = document.getElementById('pagination');
  if (old) old.remove();
}

var STATE_NAMES = {
  'alabama':'AL','alaska':'AK','arizona':'AZ','arkansas':'AR','california':'CA',
  'colorado':'CO','connecticut':'CT','delaware':'DE','florida':'FL','georgia':'GA',
  'hawaii':'HI','idaho':'ID','illinois':'IL','indiana':'IN','iowa':'IA','kansas':'KS',
  'kentucky':'KY','louisiana':'LA','maine':'ME','maryland':'MD','massachusetts':'MA',
  'michigan':'MI','minnesota':'MN','mississippi':'MS','missouri':'MO','montana':'MT',
  'nebraska':'NE','nevada':'NV','new hampshire':'NH','new jersey':'NJ','new mexico':'NM',
  'new york':'NY','north carolina':'NC','north dakota':'ND','ohio':'OH','oklahoma':'OK',
  'oregon':'OR','pennsylvania':'PA','rhode island':'RI','south carolina':'SC',
  'south dakota':'SD','tennessee':'TN','texas':'TX','utah':'UT','vermont':'VT',
  'virginia':'VA','washington':'WA','west virginia':'WV','wisconsin':'WI','wyoming':'WY'
};

function applyFilters() {
  currentPage = 1;
  var q     = document.getElementById('search-input').value.trim().toLowerCase();
  var state = document.getElementById('state-filter').value;
  var f = allAgents;
  if (state) f = f.filter(function(a){ return a.state === state; });
  if (q) {
    var stateAbbr = STATE_NAMES[q] || null;
    var isAbbrOnly = /^[a-z]{2}$/.test(q) && !stateAbbr;
    f = f.filter(function(a){
      if (isAbbrOnly) {
        // exact state abbreviation match (e.g. typed "ca", "az", "tx")
        return (a.state || '').toLowerCase() === q;
      }
      return (a.name    ||'').toLowerCase().includes(q) ||
             (a.city    ||'').toLowerCase().includes(q) ||
             (a.company ||'').toLowerCase().includes(q) ||
             (stateAbbr && a.state === stateAbbr) ||
             (a.state   ||'').toLowerCase() === q;
    });
  }
  filteredAgents = f;
  renderPage();
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('state-filter').value = '';
  filteredAgents = allAgents;
  currentPage = 1;
  renderPage();
  document.getElementById('results-bar').textContent = '';
}

async function init() {
  var result = await db
    .from('agents')
    .select('name,slug,city,state,specialties,phone,email,company')
    .order('name', { ascending: true })
    .limit(1000);

  var data = result.data;
  if (!data || !data.length) {
    document.getElementById('agent-grid').innerHTML = '<div class="empty-state"><strong>No agents found</strong>Check back soon.</div>';
    return;
  }

  allAgents = data;
  filteredAgents = data;
  document.getElementById('total-count').textContent = data.length;

  var states = [];
  data.forEach(function(a){ if (a.state && states.indexOf(a.state) === -1) states.push(a.state); });
  states.sort();
  var sel = document.getElementById('state-filter');
  states.forEach(function(s){ var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

  var params = new URLSearchParams(window.location.search);
  if (params.get('state')) sel.value = params.get('state');
  if (params.get('q')) document.getElementById('search-input').value = params.get('q');

  applyFilters();

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('state-filter').addEventListener('change', applyFilters);
}

init();
</script>
</body>
</html>
